<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Analysis</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 1200px; margin: 0 auto; padding: 20px; }
        #result, #financialResult { margin-top: 20px; white-space: pre-wrap; }
        button { margin-right: 10px; }
    </style>
</head>
<body>
    <h1>Stock Analysis</h1>
    <input type="text" id="symbolInput" placeholder="Enter stock symbol">
    <button onclick="getQuote()">Get Quote</button>
    <button onclick="getFinancials()">Get Financials</button>
    <div id="result"></div>
    <div id="financialResult"></div>

    <script>
    async function getQuote() {
        const symbol = document.getElementById('symbolInput').value.toUpperCase();
        if (!symbol) {
            alert('Please enter a stock symbol');
            return;
        }
        
        document.getElementById('result').innerText = 'Loading...';
        
        try {
            const response = await fetch(`/quote/${symbol}`);
            const data = await response.json();
            
            if (response.ok) {
                const formattedData = formatQuoteData(data);
                document.getElementById('result').innerText = formattedData;
            } else {
                document.getElementById('result').innerText = `Error: ${data.error}`;
            }
        } catch (error) {
            document.getElementById('result').innerText = `Error: ${error.message}`;
        }
    }

    async function getFinancials() {
        const symbol = document.getElementById('symbolInput').value.toUpperCase();
        if (!symbol) {
            alert('Please enter a stock symbol');
            return;
        }
        
        document.getElementById('financialResult').innerText = 'Loading...';
        
        try {
            const response = await fetch(`/financials/${symbol}`);
            const data = await response.json();
            
            if (response.ok) {
                const formattedData = formatFinancialData(data);
                document.getElementById('financialResult').innerText = formattedData;
            } else {
                document.getElementById('financialResult').innerText = `Error: ${data.error}`;
            }
        } catch (error) {
            document.getElementById('financialResult').innerText = `Error: ${error.message}`;
        }
    }

    function formatQuoteData(data) {
        return `
Symbol: ${data.symbol}
Company Name: ${data.longName}
Current Price: $${data.regularMarketPrice.toFixed(2)}
Change: ${data.regularMarketChange.toFixed(2)} (${data.regularMarketChangePercent.toFixed(2)}%)
Previous Close: $${data.regularMarketPreviousClose.toFixed(2)}
Open: $${data.regularMarketOpen.toFixed(2)}
Day's Range: $${data.regularMarketDayLow.toFixed(2)} - $${data.regularMarketDayHigh.toFixed(2)}
52 Week Range: $${data.fiftyTwoWeekLow.toFixed(2)} - $${data.fiftyTwoWeekHigh.toFixed(2)}
Volume: ${data.regularMarketVolume.toLocaleString()}
        `;
    }

    function formatFinancialData(data) {
    let result = 'Balance Sheet:\n';
    result += JSON.stringify(data.balanceSheet.balanceSheetStatements, null, 2);
    result += '\n\nCash Flow Statement:\n';
    result += JSON.stringify(data.cashFlow.cashflowStatements, null, 2);
    result += '\n\nIncome Statement:\n';
    result += JSON.stringify(data.incomeStatement.incomeStatementHistory, null, 2);
    return result;
}
    </script>
</body>
</html>
